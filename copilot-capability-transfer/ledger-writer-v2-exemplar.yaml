schema_ahead:
  business_capability:
    answer: |
      Payment Transaction Acceptance (banking domain — BIAN: Payment Execution service domain). The business capability is "validate and record payment transactions with authorization, balance sufficiency, and deduplication." This capability exists independent of the Spring Boot implementation; any payment system implements the same validation-and-persist pattern. [S1; S2: BIAN alignment]
    provenance: inferred
  sole_implementation:
    answer: |
      Yes — single transaction acceptance gate in this architecture. There is no alternative payment path, no degraded mode, no bypass. If ledger-writer is replaced, the 6-step validation chain and audit trail requirement transfer. [S1: single controller, single endpoint]
    provenance: extracted
  persistence_analysis:
    answer: |
      Capability-tied (persists if implementation changes): The 6-step validation chain, the audit trail requirement, the balance sufficiency check, the deduplication requirement, the stakeholder expectations, the signal definitions (success rate, latency, capacity), the impact model.

      Implementation-tied (does NOT transfer): Spring Boot, Micrometer, Guava cache (per-pod dedup), HikariCP connection pool, specific Prometheus queries, JPA/Hibernate persistence, RestTemplate HTTP client, JWT validation via Spring Security. A replacement service (e.g., Go with gRPC) would keep Business Health signals but completely change Process/System queries and telemetry.
    provenance: inferred
  business_processes:
    answer: |
      Send Payment — customer-to-customer funds transfer: initiate → validate → persist → update-balances → confirm. Ledger-writer owns the validate-and-persist steps. [S4: Send Payment flow analysis]
    provenance: inferred
  process_role:
    answer: |
      Transaction Acceptance (step 2 of Send Payment flow). What comes before: Frontend captures payment details and submits. What comes after: Balance-reader updates cached balances, customer sees confirmation. Ledger-writer IS the critical path — without it, the payment flow stops at submission. [S4: flow analysis]
    provenance: inferred
  journey_impact:
    answer: |
      When ledger-writer degrades, the Send Payment flow halts at transaction acceptance. Upstream: frontend accumulates unprocessed payment submissions. Downstream: balance-reader never sees the transaction → customer sees stale balance → payment appears lost. The most insidious impact is the deduplication gap: pod restart loses the Guava cache → client retries create duplicate ledger entries → reconciliation breaks. [S4: cascading failure analysis; S1: Guava cache architecture]
    provenance: inferred
  sub_capabilities:
    answer: |
      Yes — three distinct sub-capabilities with different failure characteristics:
      1. Transaction Validation — JWT auth, format checks, sender authentication, business rules (steps 1-6)
      2. Balance Verification — HTTP call to balance-reader, sufficiency check (step 7, internal transactions only)
      3. Ledger Persistence — JPA write to ledger-db, deduplication cache update
      [S1: LedgerWriterController.java, TransactionValidator.java]
    provenance: extracted
    names:
      - Transaction Validation
      - Balance Verification
      - Ledger Persistence
  sub_capability_detail:
    answer: |
      Transaction Validation:
      - Steps 1-6: JWT auth → format checks → sender authentication → amount > 0 → no self-send → routing number format
      - Failure mode: HTTP 400 with distinct error messages per step
      - Signal: payment_validation_rate (Process)

      Balance Verification:
      - Step 7: HTTP GET to balance-reader /balances/{account_num}
      - Only for internal transactions (fromRoutingNum == LOCAL_ROUTING_NUM)
      - Failure mode: HTTP 500 (ResourceAccessException) or HTTP 400 (insufficient balance)
      - Signal: balance_check_latency_p95 (Process)

      Ledger Persistence:
      - JPA transactionRepository.save() + Guava cache dedup update
      - Failure mode: HTTP 500 (CannotCreateTransactionException)
      - Signal: ledger_write_latency_p95 (Process)
      [S1: LedgerWriterController.java]
    provenance: extracted
  telemetry_distinguishability:
    answer: |
      Yes — fully distinguishable via HTTP status codes and error messages:
      - Transaction Validation failures: HTTP 400 with specific messages per validation step (e.g., "sender not authenticated", "invalid routing number")
      - Balance Verification failures: HTTP 500 (ResourceAccessException — dependency) or HTTP 400 (insufficient balance — business logic)
      - Ledger Persistence failures: HTTP 500 (CannotCreateTransactionException)
      - Span-level metrics from Spring Cloud Sleuth differentiate the steps within the request lifecycle.
      [S1: LedgerWriterController.java exception handling, TransactionValidator.java]
    provenance: extracted

gaps:
  - "Guava dedup cache is per-pod, not distributed. Pod restart or cross-replica routing creates a deduplication blind spot — duplicate_prevention_rate measures cache effectiveness, not absolute deduplication."
  - "No circuit breaker or timeout override on the Balance-Reader HTTP call. Slow balance-reader degrades all local transactions with no fail-fast mechanism."
  - "Balance-reader cache staleness can cause overdraft — two rapid payments both pass the balance check due to eventual consistency. No signal detects this race condition."
  - "JWT public key has no runtime rotation — loaded once at startup from PUB_KEY_PATH. Key rotation requires pod restart."
  - "Escalation policy and alert routing are constructed — demo app has no operational team or incident management process."
  - "transaction_request_rate has SLO target 0 and thresholds 0 — it is an informational/capacity-planning signal, not SLO-bearing. The schema requires these fields; the values are placeholders."
  - "No composite health signal for Payments Operations — operators must correlate individual metrics to determine overall payment system state."
