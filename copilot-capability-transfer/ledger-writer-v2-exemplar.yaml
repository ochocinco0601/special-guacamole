impacts:
  - signal_name: customers_affected
    display_name: Customers Affected
    impact_category: customer_experience
    impact_unit: customers/hour
    business_description: |
      Count of unique customers experiencing payment failures per hour. Derived from transaction failure rate and unique sender accounts in failed transactions. [S1: transaction volume; S4: baseline analysis]
    business_description_display: "Customers per hour who tried to pay and couldn't."
    reasoning: |
      Direct customer impact signal. Maps to Bank Customers (customer_experience). Hour 1: ~12 customers affected at baseline volume. Hour 4: cumulative impact triggers exec notification. Hour 24: customer complaint volume triggers regulatory attention.
