  - signal_name: revenue_at_risk
    display_name: Revenue at Risk
    impact_category: financial
    impact_unit: "$/hour"
    business_description: |
      Estimated dollar value of failed payment transactions per hour. Based on average transaction value and failure rate. Includes both direct loss (failed payments) and indirect cost (manual reconciliation, customer compensation). [Derived from transaction volume x average value x failure rate]
    business_description_display: "Estimated dollars lost per hour from failed payments."
    reasoning: |
      Financial impact signal. Maps to Bank Customers (customer_experience) and Finance & Treasury (financial). Hour 1: ~$2,400/hour at baseline. Hour 4: cumulative $9,600+ triggers Finance escalation. Hour 24: material financial impact requiring disclosure.
    provenance: constructed

  - signal_name: regulatory_exposure_hours
    display_name: Regulatory Exposure Hours
    impact_category: legal_risk
    impact_unit: hours
    business_description: |
      Cumulative hours where transaction audit completeness is below regulatory threshold. Each hour of gap accumulates exposure — regulators measure duration of non-compliance, not just occurrence. Triggers mandatory incident reporting at defined thresholds. [Banking regulatory domain knowledge]
    business_description_display: "Cumulative hours of audit non-compliance — duration-based regulatory exposure."
    reasoning: |
      Regulatory impact signal. Maps to Compliance & Risk Management (legal_risk). Hour 1: internal compliance notification. Hour 4: mandatory compliance officer briefing. Hour 24: regulatory reporting obligation triggered.
    provenance: constructed

  - signal_name: manual_investigation_backlog
    display_name: Manual Investigation Backlog
    impact_category: operational
    impact_unit: investigations/hour
    business_description: |
      Rate of payment failures requiring manual investigation by operations staff. Each failed transaction without clear diagnostic context generates an investigation ticket. At sustained rates, backlog exceeds team capacity and response SLAs breach. [S1: error handling produces diagnostic context; operational staffing model]
