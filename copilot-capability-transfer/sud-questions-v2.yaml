# --- v2 Structural Concepts ---
#
# This instrument captures data in motivation-chain traversal order and
# writes to the same flat JSON arrays (stakeholders[], sliDefinitions[],
# impactDefinitions[], traceabilityMappings[]). The JSON is a serialization
# format consumed by machines. The SUD is an elicitation instrument
# encountered by humans and AI agents. These are different interfaces
# serving different consumers.
#
# Five structural concepts new to v2:
#
# 1. parts replace sections as the top-level organizer
#    Each part maps to an actor, an altitude, and a health dimension
#    framework (F-35).
#
# 2. observability_layer on signal-bearing parts
#    The agent writes this value to sliDefinitions[].observabilityLayer
#    for every signal captured in that part. Never asked as a question.
#    Replaces v1 q17 (eliminated — layer is structural).
#
# 3. repeat_per on parts and groups
#    Indicates iteration. repeat_per: stakeholder on Part 2 means the
#    entire chain repeats per stakeholder. repeat_per: signal means the
#    signal block repeats within its scope.
#
# 4. chain with group entries
#    Organizes questions by viewpoint traversal position within a
#    repeating part. Groups are the motivation chain structure.
#
# 5. positions on groups
#    Metadata documenting which viewpoint traversal positions (1-9)
#    the group populates. Informational — not consumed by validators.
#
# Part ordering encodes the causal hierarchy:
#   Part 1 (Service Context) → framing
#   Part 2 (Business Health) → stakeholder symptoms (L3 anchor)
#   Part 2b (Business Impact) → consequence quantification (L4)
#   Part 3 (Process) → cause investigation (L2)
#   Part 4 (System) → infrastructure health (L1)
#   Part 5 (Operational) → ownership and response
#   The agent designs Business Health signals first (Part 2) because
#   they anchor the causal model — Process and System signals exist
#   to explain Business Health failures.

eliminated_questions:
  - id: q17
    v1_section: signals
    v1_bare: "What layer?"
    reason: >
      Structural — observabilityLayer determined by instrument position.
      Every signal in Part 2 is Business Health, Part 3 is Process,
      Part 4 is System. The reasoning guidance from q17's enhanced text
      ("L3 is the anchor — design L3 first") becomes the structural
      rationale for Part 2 preceding Parts 3-4.
    prior_art_preserved: >
      Four-layer observability model, Signal layer taxonomy, Causal
      model rule (35-signal pressure test) — encoded in part ordering
      and observability_layer declarations.

  - id: q29
    v1_section: traceability
    v1_bare: "Which stakeholder does each signal serve?"
    reason: >
      Structural — chain nesting IS traceability. In Part 2, each
      signal nested under a stakeholder chain produces a
      traceabilityMappings[] row with relationshipType "verifies".
      In Part 2b, impact_driver_refs produces traceabilityMappings[]
      rows with relationshipType "quantifies". The agent generates
      mapping rows from structural nesting.
    prior_art_preserved: >
      RTM (IEEE 830) — bidirectional traceability encoded structurally.

promoted_questions:
  - from_id: q18
    to_id: diagnostic_causal_ref
    reason: >
      Promoted from schema_ahead to structured field in Part 3.
      v1 q18 asked generically about causal relationships across all
      layers. diagnostic_causal_ref asks specifically "which Business
      Health signals does this Process signal help explain?" — the
      F-31 Step 3 diagnostic navigation path. schema_ahead changes
      from true to false.

# --- Shared Question Definitions ---
# Questions appearing in multiple signal-bearing parts (Parts 2, 3, 4).
# Defined once with YAML anchors, referenced via alias in each part.

shared_questions:

  - &q16
    id: q16
    bare: "What is this signal measuring?"
    enhanced: "What question does this signal answer? State it as a stakeholder question."
    prior_art: ["SRE SLO Document"]
    populates: []
    schema_ahead: true
    evidence:
      section_pattern: "(signal|SLO|SLI|L[1234])"
      content_patterns:
        - pattern: "(\\*\\*Question:\\*\\*|question.*does this signal)"
          description: "signal question stated"

  - &q16a
    id: q16a
    bare: "What is this signal called?"
    enhanced: "Machine identifier (snake_case) and display name (human-readable)"
    prior_art: []
    populates: ["sliDefinitions[].signalName", "sliDefinitions[].signalDisplayName"]
    schema_ahead: false
    evidence:
      section_pattern: "(signal|SLI|L[123])"
      content_patterns:
        - pattern: "(signal.*name|_rate|_p\\d+|_success|_availability|_latency)"
          description: "signal identifier present"
        - pattern: "(### L[1234].*:.*Rate|### L[1234].*:.*Latency|### L[1234].*:.*Availability|### L[1234].*:.*Success)"
          description: "signal display name in heading"

  - &q16b
    id: q16b
    bare: "What telemetry platform?"
    enhanced: "Data source type if known — may not be determined at onboarding time"
    prior_art: ["SLODLC Discover §4.3 observability systems"]
    populates: ["sliDefinitions[].dataSourceType"]
    schema_ahead: false
    evidence:
      section_pattern: "."
      content_patterns:
        - pattern: "(Prometheus|Splunk|Datadog|AppDynamics|datasource)"
          description: "telemetry platform stated"

  - &q16c
    id: q16c
    bare: "Who owns this signal?"
    enhanced: "Per-signal technical owner — may differ from service owner by layer"
    prior_art: ["SRE three-actor ownership model — ownership varies by observability layer"]
    populates: ["sliDefinitions[].technicalOwner"]
    schema_ahead: false
    evidence:
      section_pattern: "."
      content_patterns:
        - pattern: "(Platform Team|technical owner|owned by|Platform.owned)"
          description: "signal ownership stated"

  - &q19
    id: q19
    bare: "What signal type?"
    enhanced: "Ratio (good/total) or threshold (measurement vs limit)?"
    prior_art: ["SRE SLO signal classification"]
    populates: ["sliDefinitions[].signalType"]
    schema_ahead: false
    evidence:
      section_pattern: "(signal|SLI)"
      content_patterns:
        - pattern: "(sli_ratio|sli_threshold|ratio|threshold)"
          description: "signal type stated"

  - &q20
    id: q20
    bare: "What's the business description?"
    enhanced: "Language a product owner would understand — no technical jargon"
    prior_art: ["SLODLC Discover §1.3 business context"]
    populates: ["sliDefinitions[].descriptionBusiness"]
    schema_ahead: false
    evidence:
      section_pattern: "(signal|SLI|L[123])"
      content_patterns:
        - pattern: "(percentage|rate of|time from|customers|purchases)"
          description: "business-framed language present"

  - &q21
    id: q21
    bare: "What's the technical description?"
    enhanced: "Implementation — telemetry, queries, edge cases"
    prior_art: ["SRE SLO Document SLI specification"]
    populates: ["sliDefinitions[].descriptionTechnical"]
    schema_ahead: false
    evidence:
      section_pattern: "(signal|SLI|L[123])"
      content_patterns:
        - pattern: "(span|gRPC|Prometheus|PromQL|query|traces_)"
          description: "technical implementation described"

  - &q22
    id: q22
    bare: "What's the SLO target?"
    enhanced: "The target AND why that number — error budget, relationship to other services. Where sources describe existing SLAs, contractual commitments, or historical reliability baselines, use them as the starting point for target reasoning. A target disconnected from existing commitments won't be trusted by the team operating the service."
    prior_art: ["SRE SLO Document Rationale section", "SLODLC Discover §1.4 existing SLAs", "ISO 22301 BIA RTO-RPO"]
    populates: ["sliDefinitions[].sloTarget", "sliDefinitions[].sloTargetRationale"]
    schema_ahead: false
    evidence:
      section_pattern: "(SLO|target|signal)"
      content_patterns:
        - pattern: "SLO target[:\\s]*\\d+"
          description: "SLO target stated"
        - pattern: "(because|reasoning|budget allows|rationale)"
          description: "target rationale present"

  - &q22a
    id: q22a
    bare: "Where does this requirement come from?"
    enhanced: >
      Provenance citation — the authority behind the target, not the
      rationale for the number. Regulatory: "12 CFR 1026.19(f)(1)(ii)".
      Contractual: "MSA §4.2 — 99.9% availability". Internal: "Platform
      Engineering standard — Q3 2025 SLO review". If a URL to the source
      document exists, capture it. Every requirement has a source — even
      "team convention" is a valid provenance that makes the implicit
      explicit.
    prior_art: ["Dublin Core dcterms:source", "Dublin Core dcterms:references", "ISO/IEC/IEEE 29148 requirement attributes"]
    populates: ["sliDefinitions[].requirementSource", "sliDefinitions[].requirementSourceUrl"]
    schema_ahead: false
    evidence:
      section_pattern: "(source|provenance|authority|requirement.*from)"
      content_patterns:
        - pattern: "(CFR|SLA|standard|internal|regulatory|contractual|convention)"
          description: "requirement provenance cited"

  - &q23
    id: q23
    bare: "What budgeting method?"
    enhanced: "Occurrences or time_slices? With reasoning."
    prior_art: ["SRE SLO error budget methodology"]
    populates: ["sliDefinitions[].budgetingMethod"]
    schema_ahead: false
    evidence:
      section_pattern: "(budget|signal)"
      content_patterns:
        - pattern: "(occurrences|time.slices|budgeting)"
          description: "budgeting method stated"

  - &q24
    id: q24
    bare: "What time window?"
    enhanced: "Measurement period — rolling or calendar-aligned?"
    prior_art: ["SRE SLO Document"]
    populates: ["sliDefinitions[].timeWindow", "sliDefinitions[].timeWindowType"]
    schema_ahead: false
    evidence:
      section_pattern: "."
      content_patterns:
        - pattern: "(30d|7d|rolling|calendar)"
          description: "time window stated"

  - &q24a
    id: q24a
    bare: "What are the health thresholds?"
    enhanced: "Two-threshold health classification: at what level is the signal warning? At what level is it critical? These drive real-time dashboard tile color (healthy/warning/critical), distinct from SLO alerting thresholds which drive burn-rate alerts."
    prior_art: ["Nagios two-threshold model (1999)", "BOS schema v3.11 two-threshold addition"]
    populates: ["sliDefinitions[].healthWarningThreshold", "sliDefinitions[].healthCriticalThreshold"]
    schema_ahead: false
    evidence:
      section_pattern: "(health|threshold|warning|critical)"
      content_patterns:
        - pattern: "(health.*threshold|warning.*threshold|critical.*threshold|tile color|dashboard.*color)"
          description: "health thresholds stated"

  - &q25
    id: q25
    bare: "What are the alerting and page thresholds?"
    enhanced: "Warning and page levels — why those thresholds relative to SLO?"
    prior_art: ["SRE alerting methodology", "SLODLC Discover §4.4 alerting"]
    populates: ["sliDefinitions[].alertingThreshold", "sliDefinitions[].pageThreshold", "sliDefinitions[].alertSeverity", "sliDefinitions[].pageSeverity"]
    schema_ahead: false
    evidence:
      section_pattern: "."
      content_patterns:
        - pattern: "(alerting|page|warning|critical|threshold)"
          description: "alerting thresholds stated"

  - &q26
    id: q26
    bare: "What are the queries?"
    enhanced: "Numerator/denominator for ratios, measurement/operator/value for thresholds"
    prior_art: ["SRE SLO Document SLI measurement", "SLODLC Discover §4.3 SLI calculation methods"]
    populates: ["sliDefinitions[].queryNumerator", "sliDefinitions[].queryDenominator", "sliDefinitions[].queryNumeratorDescription", "sliDefinitions[].queryDenominatorDescription", "sliDefinitions[].thresholdOperator", "sliDefinitions[].thresholdValue", "sliDefinitions[].thresholdUnit"]
    schema_ahead: false
    evidence:
      section_pattern: "."
      content_patterns:
        - pattern: "(query|PromQL|sum\\(rate|histogram_quantile)"
          description: "query present"

# =====================================================================
# PARTS — The five-part instrument structure
# =====================================================================

parts:

  # =================================================================
  # Part 1 — Service Context
  # =================================================================
  # Positions populated: 5 (Subject), 6 (Object)
  # Actor: N/A — contextual framing
  # No observability_layer — this part captures service identity,
  # not signals.
  # =================================================================

  - part: service_context
    description: "Service identity, dependencies, capabilities, processes"
    questions:

      # --- Sources ---
      - id: sources
        bare: "What sources are available for this service?"
        enhanced: "Inventory all available sources with epistemological type (definitional/descriptive/behavioral)"
        prior_art: ["RTM (IEEE 830)"]
        populates: []
        schema_ahead: false
        evidence:
          section_pattern: "(## Sources|Source|source.*type)"
          content_patterns:
            - pattern: "\\|.*S\\d+.*\\|"
              description: "source table with IDs"

      # --- Service identity ---
      - id: q1
        bare: "What does this service do?"
        enhanced: "What does this service do, described in business terms a non-engineer stakeholder would understand?"
        prior_art: ["SLODLC Discover Q1", "arc42 §1.1 requirements overview"]
        populates: ["service.businessPurpose"]
        schema_ahead: false
        evidence:
          section_pattern: "(what is this service|service context|what does it do)"
          content_patterns:
            - pattern: "(business purpose|business position)"
              description: "business position stated"

      - id: q2
        bare: "What name?"
        enhanced: ""
        prior_art: ["ITIL CMDB CI identity"]
        populates: ["service.displayName", "service.serviceName", "service.serviceId"]
        schema_ahead: false
        evidence:
          section_pattern: "(service understanding|service id|# )"
          content_patterns:
            - pattern: "Service ID"
              description: "service ID stated"

      - id: q3
        bare: "What tier?"
        enhanced: "What is the service's criticality tier? Critical path or non-critical path? Evaluate based on what the service enables in its business context — not what the service does in isolation. Where source material describes dependent workflows, regulatory requirements, or business processes this service gates, use that evidence. If a CMDB criticality designation exists, treat it as a starting data point to validate against source evidence. Where sources are silent on business context, label the tier assessment as inferred."
        prior_art: ["ISO 22301 BIA criticality rating", "IEC 60812 FMEA severity rating"]
        populates: ["service.tier"]
        schema_ahead: false
        evidence:
          section_pattern: "(critical.path|non.critical|business position|tier)"
          content_patterns:
            - pattern: "(critical.path|non.critical.path|revenue.influencing)"
              description: "critical-path judgment stated"

      - id: q4
        bare: "What business unit?"
        enhanced: ""
        prior_art: ["ITIL CMDB CI organizational fields"]
        populates: ["service.businessUnit"]
        schema_ahead: false
        evidence:
          section_pattern: "."
          content_patterns:
            - pattern: "(business unit|business.*unit)"
              description: "business unit named"

      - id: q5
        bare: "What functional category?"
        enhanced: "What kind of work does this service do? (Transaction Processing, Data Management, etc.)"
        prior_art: ["BIAN service domain categorization"]
        populates: ["service.functionalCategory"]
        schema_ahead: false
        evidence:
          section_pattern: "."
          content_patterns:
            - pattern: "(functional category|transaction processing|data management|customer interaction)"
              description: "functional category stated"

      - id: q6
        bare: "Who owns it?"
        enhanced: "Who is the product owner (business) and technical owner (engineering)?"
        prior_art: ["SLODLC Discover §1.1-1.2 service owner", "ITIL CMDB CI ownership fields"]
        populates: ["service.productOwner", "service.technicalOwner"]
        schema_ahead: false
        evidence:
          section_pattern: "."
          content_patterns:
            - pattern: "(product owner|technical owner|owned by|team)"
              description: "ownership stated"

      - id: q6a
        bare: "What are the CMDB identifiers?"
        enhanced: "What is the org ID and application ID in the enterprise CMDB, if known?"
        prior_art: ["ITIL Configuration Management"]
        populates: ["service.orgId", "service.appId"]
        schema_ahead: false
        evidence:
          section_pattern: "."
          content_patterns:
            - pattern: "(orgId|appId|CMDB|org.id|app.id)"
              description: "CMDB identifiers stated"

      - id: q6b
        bare: "What tags categorize this service?"
        enhanced: "Keywords/labels for domain, business function, and criticality path"
        prior_art: []
        populates: ["service.tags"]
        schema_ahead: false
        evidence:
          section_pattern: "."
          content_patterns:
            - pattern: "(tags|keywords|labels)"
              description: "tags stated"

      - id: q8
        bare: "What custom telemetry already exists?"
        enhanced: "What monitoring already exists for this service? Synthesize from whatever evidence the sources provide — documentation, dashboard configurations, alert definitions, instrumentation in code. What can existing monitoring tell you about this service's health, and what can't it?"
        prior_art: ["SLODLC Discover §4.3 data sources", "arc42 §8 cross-cutting concepts", "IEC 60812 FMEA current detection controls"]
        populates: []
        schema_ahead: true
        evidence:
          section_pattern: "(telemetry|custom.*telemetry|span|metric)"
          content_patterns:
            - pattern: "(app\\.|counter|gauge|histogram|span.*attribute)"
              description: "custom telemetry identified"

      - id: q9
        bare: "What are the dependencies?"
        enhanced: "What calls this service, what does it call? Sync vs async? For each dependency: if it fails, does THIS service fail? Or does this service degrade gracefully? Where source material describes interaction patterns (sync/async), resilience mechanisms (circuit breakers, fallbacks, retry), or failure behavior, use that evidence to distinguish critical dependencies from resilient ones. Where sources are silent on resilience, label the criticality assessment as inferred."
        prior_art: ["SLODLC Discover dependency analysis", "arc42 §3 technical context", "arc42 §5 building block view", "ITIL CMDB CI relationships"]
        populates: ["operational.dependencyFlow"]
        schema_ahead: false
        evidence:
          section_pattern: "(dependenc|upstream|downstream)"
          content_patterns:
            - pattern: "(→|->|depends on|calls|gRPC|HTTP)"
              description: "dependency chain described"

      - id: q10
        bare: "What are the failure modes?"
        enhanced: "How does this service fail? Expected business behavior vs unexpected service failures? Where source material documents past outages or incidents, use them as grounding for failure modes. For each failure mode identified, note whether current monitoring can detect it — where sources describe existing detection controls or monitoring, reference them."
        prior_art: ["SLODLC Discover system behavior assessment", "arc42 §10 quality scenarios", "arc42 §11 risks", "IEC 60812 FMEA failure mode identification", "SLODLC Discover §4.1-4.2 outage history"]
        populates: []
        schema_ahead: true
        evidence:
          section_pattern: "(failure|fail|fault)"
          content_patterns:
            - pattern: "(failure mode|when.*fails|expected.*behavior|feature flag)"
              description: "failure modes identified"

      # --- Business capability identity ---
      - id: q34
        bare: "What business capability does this service implement?"
        enhanced: "Industry-standard name if one exists. The capability persists if the service is replaced."
        prior_art: ["Service flow ontology (2025-12-11)", "BIAN service domains", "ISO 22301 BIA process inventory"]
        populates: []
        schema_ahead: true
        evidence:
          section_pattern: "(capability|business capability)"
          content_patterns:
            - pattern: "(business capability|industry|capability)"
              description: "business capability named"

      - id: q35
        bare: "Is this the sole implementation?"
        enhanced: "Does the capability span multiple services?"
        prior_art: ["Service flow ontology — Type B flows"]
        populates: []
        schema_ahead: true
        evidence:
          section_pattern: "(capability|implementation)"
          content_patterns:
            - pattern: "(sole|shared|multiple services|span)"
              description: "implementation scope stated"

      - id: q36
        bare: "What persists if the service changes?"
        enhanced: "What transfers to a successor? Capability-tied vs implementation-tied understanding."
        prior_art: ["MDE PIM/PSM"]
        populates: []
        schema_ahead: true
        evidence:
          section_pattern: "(persist|decompos|replac|successor)"
          content_patterns:
            - pattern: "(persist|transfer|capability|implementation)"
              description: "persistence reasoning present"

      # --- Flow participation ---
      - id: q37
        bare: "What business processes does this service participate in?"
        enhanced: "Journeys, value streams — named in business terms, not technical"
        prior_art: ["Business journey mapping architecture (2026-02-24)", "SLODLC Discover §2.2-2.4 user journeys", "ISO 22301 BIA process inventory", "ArchiMate Business Process"]
        populates: ["service.process_participations[].process_name"]
        schema_ahead: false
        evidence:
          section_pattern: "(process|journey|flow|value stream)"
          content_patterns:
            - pattern: "(journey|value stream|business process|flow)"
              description: "business process participation stated"

      - id: q38
        bare: "What role in each process?"
        enhanced: "What stage/function? What comes before/after? Critical path of the process?"
        prior_art: ["Service flow ontology (2025-12-11) — Type B flow", "ArchiMate Serving relationship", "ArchiMate Triggering"]
        populates: ["service.process_participations[].step_name", "service.process_participations[].blocking", "service.process_participations[].description"]
        schema_ahead: false
        evidence:
          section_pattern: "(process|journey|role|stage)"
          content_patterns:
            - pattern: "(stage|before|after|critical path|step)"
              description: "process role described"

      - id: q39
        bare: "What's the journey-level impact?"
        enhanced: "Impact on the business process when this service degrades — may differ from per-service impact"
        prior_art: ["Business journey mapping architecture", "Pathpoint health propagation", "ArchiMate Triggering — downstream impact"]
        populates: ["service.process_participations[].downstream_impact"]
        schema_ahead: false
        evidence:
          section_pattern: "(journey|process|impact)"
          content_patterns:
            - pattern: "(journey.*impact|process.*impact|propagat|bubbles up)"
              description: "journey-level impact described"

      # --- Internal flow decomposition ---
      - id: q40
        bare: "Does this service have distinct sub-capabilities?"
        enhanced: "Different stakeholders care about different operations?"
        prior_art: ["Service flow ontology (2025-12-11) — Type A flow", "arc42 §5 building block view", "IEC 60812 FMEA focus element"]
        populates: []
        schema_ahead: true
        evidence:
          section_pattern: "(sub.capabilit|operation|decompos|internal)"
          content_patterns:
            - pattern: "(sub.capabilit|use case|operation|different stakeholder)"
              description: "sub-capabilities identified"

      - id: q41
        bare: "What are the sub-capabilities?"
        enhanced: "Named, with stakeholder expectations and signals scoped to each"
        prior_art: ["Service flow ontology — flow as scoping mechanism"]
        populates: []
        schema_ahead: true
        evidence:
          section_pattern: "(sub.capabilit|operation)"
          content_patterns:
            - pattern: "(scop|scope|within|specific to)"
              description: "scoping to sub-capabilities present"

      - id: q42
        bare: "Can telemetry distinguish the sub-capabilities?"
        enhanced: "Span attributes, API endpoints that differentiate operations"
        prior_art: ["IEC 60812 FMEA detection controls"]
        populates: []
        schema_ahead: true
        evidence:
          section_pattern: "(telemetry|distinguish|sub.capabilit)"
          content_patterns:
            - pattern: "(span.*attribute|endpoint|operation.*name|distinguish)"
              description: "telemetry distinguishability assessed"

      - id: q43
        bare: "Does every identified sub-capability have a dedicated L3 signal?"
        enhanced: "For each sub-capability with distinguishable telemetry, verify L3 signal coverage. If not, produce one. If intentionally aggregated, document rationale."
        prior_art: ["IEEE 830 traceability analysis", "Signal coverage completeness — identified capability without signal = blind spot", "IEC 60812 FMEA detection rating"]
        populates: []
        schema_ahead: false
        evidence:
          section_pattern: "(sub.capabilit|signal|coverage|L3)"
          content_patterns:
            - pattern: "(per.sub.capability|dedicated.*signal|coverage.*check|Job Completion)"
              description: "per-sub-capability signal coverage verified"

  # =================================================================
  # Part 2 — Stakeholder Motivation Chains
  # =================================================================
  # Positions populated: 1 (Stakeholder), 2 (Driver), 3 (Requirement),
  #                      4 (Outcome)
  # Defining actor: PO (determines what to measure, what targets to set)
  # Contributing actor: Dev (provides technical description, query
  #                     implementation, data source)
  # Health dimension framework: APQC (Effectiveness, Efficiency,
  #                             Adaptability) — per F-35
  # observability_layer: Business Health (structural)
  # Repeats: once per stakeholder
  #
  # Each chain captures one stakeholder's complete motivation path:
  # who they are → what concerns them → what requirements that concern
  # creates → what signals measure those requirements.
  #
  # The agent writes observabilityLayer: "Business Health" to JSON for
  # every signal captured in this part.
  #
  # Traceability is structural: each signal nested under a stakeholder
  # produces a traceabilityMappings[] row with relationshipType "verifies".
  # =================================================================

  - part: stakeholder_chains
    description: "One complete motivation chain per stakeholder"
    repeat_per: stakeholder
    observability_layer: "Business Health"
    chain:

      - group: stakeholder_identification
        positions: [1]
        questions:

          - id: q11
            bare: "Who are the stakeholders?"
            enhanced: "Who is affected when this service degrades? Consider all four impact categories."
            prior_art: ["SLODLC Discover Q2-Q3", "ISO 22301 BIA process inventory"]
            populates: ["stakeholders[].stakeholder"]
            schema_ahead: false
            evidence:
              section_pattern: "(who cares|stakeholder)"
              content_patterns:
                - pattern: "(customer_experience|financial|operational|legal_risk)"
                  description: "impact categories considered"
                - pattern: "(CRITICAL|HIGH|MEDIUM|LOW)"
                  description: "priorities assigned"

          - id: q12
            bare: "What does each stakeholder expect?"
            enhanced: "Stated as a testable expectation — something you could write a signal to verify"
            prior_art: ["SLODLC Discover Q4", "SLODLC Discover §2.2-2.4 user journey expectations"]
            populates: ["stakeholders[].expectationStatement"]
            schema_ahead: false
            evidence:
              section_pattern: "(stakeholder|who cares|expect)"
              content_patterns:
                - pattern: "(expect|when.*fail|without errors|complete)"
                  description: "expectation stated"

          - id: q14
            bare: "What's the priority?"
            enhanced: "CRITICAL = blocks core function. HIGH = significant. MEDIUM = recoverable."
            prior_art: ["SRE forced prioritization — CRITICAL/HIGH/MEDIUM with behavioral definitions", "IEC 60812 FMEA severity rating"]
            populates: ["stakeholders[].priority"]
            schema_ahead: false
            evidence:
              section_pattern: "(stakeholder|priority)"
              content_patterns:
                - pattern: "(CRITICAL|HIGH|MEDIUM|LOW)"
                  description: "priority assigned"

      - group: driver
        positions: [2]
        questions:

          - id: q15a
            bare: "What is the named concern (driver) for each stakeholder?"
            enhanced: >
              The Driver is the named condition that motivates this stakeholder's
              expectations of this service. Not the expectation itself (that's q12),
              not the damage when violated (that's q13), but the underlying concern:
              "Customer Experience", "Revenue Integrity", "Service Reliability",
              "Regulatory Compliance". One Driver per stakeholder-service pair.
              Also document WHY this concern exists — the framing that connects
              the stakeholder to the service's domain.
            prior_art: ["ArchiMate 3.2 Driver element", "COSO ERM 2017 risk driver identification"]
            populates: ["stakeholders[].driverName", "stakeholders[].driverDocumentation"]
            schema_ahead: false
            evidence:
              section_pattern: "(driver|concern|motivation)"
              content_patterns:
                - pattern: "(Customer Experience|Revenue|Reliability|Compliance|concern|driver)"
                  description: "named driver identified per stakeholder"

          - id: q15
            bare: "What impact category?"
            enhanced: "customer_experience, financial, legal_risk, operational"
            prior_art: ["ISO 22301 BIA impact categories"]
            populates: ["stakeholders[].impactCategory"]
            schema_ahead: false
            evidence:
              section_pattern: "(stakeholder|impact|category)"
              content_patterns:
                - pattern: "(customer_experience|financial|operational|legal_risk)"
                  description: "impact category assigned"

          - id: q13
            bare: "What happens when the expectation is violated?"
            enhanced: "Concrete business damage — specific and measurable. Quantify the damage in terms this stakeholder would use to describe it. Where sources provide evidence of scale — financial figures, customer volumes, regulatory deadlines, operational burden — use them. The goal is a number the stakeholder recognizes, not a generic damage statement."
            prior_art: ["SLODLC Discover Q3", "ISO 22301 BIA impact analysis"]
            populates: ["stakeholders[].impactDescription"]
            schema_ahead: false
            evidence:
              section_pattern: "(impact|what happens|damage)"
              content_patterns:
                - pattern: "(impact.*description|when.*fail|degraded|lost|broken|unable|abandonment)"
                  description: "failure impact described"

      - group: coverage_gate
        questions:

          - id: q15b
            bare: "Does every stakeholder expectation have a corresponding Business Health signal?"
            enhanced: >
              For each stakeholder expectation defined in q12, verify that at least
              one Business Health (L3) signal will measure whether that expectation
              is being met. This is the bridge between stakeholder context and signal
              design — without it, signal creation defaults to whatever the service's
              API behavior suggests rather than what stakeholders need to know.

              The signal vocabulary is altitude-specific (F-35). Business Health
              signals use APQC dimensions — Effectiveness (did the right outcome
              occur?), Efficiency (did it occur within acceptable time/cost?),
              Adaptability (can it handle changing conditions?). These are the PO's
              natural vocabulary. Golden Signals (latency, errors, traffic,
              saturation) apply at Process layer. USE (utilization, saturation,
              errors) applies at System layer.

              For each stakeholder expectation, state:
                1. Which Business Health signal will verify it (existing or to be created)
                2. Which APQC dimension the expectation maps to
                3. If no signal is needed, document why (with reasoning)

              Common gap: expectations that don't look like API success/failure
              get skipped. "Records accurate for reconciliation" is APQC
              Effectiveness. "Order transmitted within 5 minutes" is APQC
              Efficiency. These are valid Business Health signals even though
              they have no Golden Signal equivalent.
            prior_art: ["APQC PCF — Effectiveness/Efficiency/Adaptability dimensions", "F-35 altitude-specific health dimension frameworks", "IEEE 830 RTM — bidirectional traceability", "SLODLC Discover — L3 anchor-first design"]
            populates: []
            schema_ahead: false
            evidence:
              section_pattern: "(stakeholder.*signal|coverage|expectation.*L3|Business Health.*for)"
              content_patterns:
                - pattern: "(verif|Business Health.*for|signal.*for each|expectation.*signal|APQC)"
                  description: "stakeholder-to-signal coverage verified"

      - group: signals
        positions: [3, 4]
        repeat_per: signal
        questions:

          # --- Requirement (position 3) ---
          - *q16
          - *q19
          - *q22
          - *q22a
          - *q24a
          - *q25

          - id: apqc_dimension
            bare: "Which APQC dimension does this signal measure?"
            enhanced: "Effectiveness (did the right outcome occur?), Efficiency (did it occur within acceptable time/cost?), Adaptability (can it handle changing conditions?). The PO's expectation maps to an APQC dimension — this is the altitude-specific health vocabulary for Business Health signals."
            prior_art: ["APQC PCF", "F-35 altitude-specific health dimension frameworks"]
            populates: []
            schema_ahead: true
            evidence:
              section_pattern: "(APQC|dimension|effectiveness|efficiency|adaptability)"
              content_patterns:
                - pattern: "(Effectiveness|Efficiency|Adaptability|APQC)"
                  description: "APQC dimension assigned"

          # --- Outcome (position 4) ---
          - *q16a
          - *q20
          - *q21
          - *q16b
          - *q26
          - *q24
          - *q23

  # =================================================================
  # Part 2b — Business Impact Assessments
  # =================================================================
  # Positions populated: 2 (Driver → Assessment) at L4 altitude
  # Actor: PO
  # observability_layer: Business Impact (structural)
  #
  # After all motivation chains: "Given the drivers above, what are
  # the quantified business consequences?"
  #
  # Impact signals are ArchiMate Assessments of Drivers, not Outcomes
  # of Requirements. They answer "what's the damage?" not "is the
  # requirement met?" One impact can reference multiple Drivers.
  #
  # Traceability: impact_driver_refs produces traceabilityMappings[]
  # rows with relationshipType "quantifies", linking impact signals
  # to stakeholders via their Drivers.
  # =================================================================

  - part: business_impact
    description: "Assessments of Drivers — quantified business consequences"
    observability_layer: "Business Impact"
    repeat_per: impact_signal
    questions:

      - id: q27a
        bare: "What is this impact signal called?"
        enhanced: "Machine identifier and display name for this impact metric"
        prior_art: []
        populates: ["impactDefinitions[].signalName", "impactDefinitions[].signalDisplayName"]
        schema_ahead: false
        evidence:
          section_pattern: "(impact|L4)"
          content_patterns:
            - pattern: "(revenue.at.risk|customers.affected|failed)"
              description: "impact signal named"

      - id: impact_driver_refs
        bare: "Which drivers does this impact assess?"
        enhanced: "Reference by stakeholder name + driver name from Part 2. One impact can assess multiple drivers — e.g., revenue_at_risk assesses both the Customer Experience driver (Online Shoppers) and the Revenue Integrity driver (Finance). Each reference produces a traceabilityMappings[] row with relationshipType 'quantifies'."
        prior_art: ["ArchiMate 3.2 Assessment-Driver relationship"]
        populates: ["traceabilityMappings[].stakeholderName", "traceabilityMappings[].impactName"]
        schema_ahead: false
        evidence:
          section_pattern: "(impact|driver|assess)"
          content_patterns:
            - pattern: "(assesses.*driver|driver.*reference|Customer Experience|Revenue Integrity|Operational Continuity)"
              description: "impact-to-driver references stated"

      - id: q28
        bare: "What impact category?"
        enhanced: "Which stakeholder impact category does this quantify?"
        prior_art: ["ISO 22301 BIA impact categories"]
        populates: ["impactDefinitions[].impactCategory"]
        schema_ahead: false
        evidence:
          section_pattern: "(impact)"
          content_patterns:
            - pattern: "(customer_experience|financial|operational|legal_risk)"
              description: "impact category assigned"

      - id: q27
        bare: "What's the impact signal?"
        enhanced: "How to quantify damage — what unit measures harm? Given what the impact analysis established about how this stakeholder experiences damage — which measurable unit best represents that? Where sources provide dollar amounts, revenue percentages, or customer volumes, derive the impact rate from those figures. If source material describes how impact escalates over time (1 hour vs 4 hours vs 1 day), capture that reasoning."
        prior_art: ["ISO 22301 BIA financial loss quantification", "SLODLC Discover §1.3 business impact"]
        populates: ["impactDefinitions[].impactUnit", "impactDefinitions[].descriptionBusiness"]
        schema_ahead: false
        evidence:
          section_pattern: "(impact|L4|Business Impact)"
          content_patterns:
            - pattern: "(customers/hour|\\$/hour|orders/hour|impact unit)"
              description: "impact unit stated"

  # =================================================================
  # Part 3 — Developer Diagnostic Signals
  # =================================================================
  # Positions populated: 3-4 at Process layer, grounded to position 5
  # Actor: Dev
  # Health dimension framework: Golden Signals (Latency, Errors,
  #                              Traffic, Saturation) — per F-35
  # observability_layer: Process (structural — not asked)
  #
  # Signals the Dev actor defines for cause investigation. These exist
  # to answer "why is Business Health red?" (F-31 Step 3).
  #
  # No stakeholder chain. Process signals are grounded to the service's
  # sub-capabilities (Part 1, q40-q43), not to stakeholder expectations.
  # =================================================================

  - part: developer_diagnostics
    description: "Process-layer signals for cause investigation"
    observability_layer: "Process"
    repeat_per: signal
    questions:

      - *q16a
      - *q19
      - *q16

      - id: diagnostic_sub_capability
        bare: "Which sub-capability does this signal measure?"
        enhanced: "Links to the internal decomposition from q40-q43. Names the specific sub-capability this Process signal monitors — e.g., 'Payment Processing' or 'Order Preparation'. Grounds the signal to the service's functional decomposition."
        prior_art: ["Service flow ontology — Type A flow", "arc42 §5 building block view"]
        populates: []
        schema_ahead: true
        evidence:
          section_pattern: "(sub.capabilit|decompos|Process)"
          content_patterns:
            - pattern: "(sub.capability|measures.*within|scope.*to|payment|order preparation)"
              description: "sub-capability reference stated"

      - id: diagnostic_causal_ref
        bare: "Which Business Health signals does this help explain?"
        enhanced: "The diagnostic navigation path — when a Business Health signal (L3) is red, this Process signal (L2) helps investigate the cause. Reference Business Health signals by name from Part 2. Example: Payment Validation Rate helps explain Checkout Completion Rate failures."
        prior_art: ["F-31 Step 3 — cause investigation", "Google SRE Ch.6 symptom/cause", "Distributed tracing causal model (Ben Sigelman)"]
        populates: []
        schema_ahead: false
        evidence:
          section_pattern: "(causal|explains|diagnostic|Business Health)"
          content_patterns:
            - pattern: "(explains.*failures|when L3|helps investigate|causal|helps explain)"
              description: "causal relationship to Business Health signals stated"

      - id: golden_signal_dimension
        bare: "Which Golden Signal dimension?"
        enhanced: "Latency, Errors, Traffic, or Saturation. The altitude-specific health vocabulary for Process-layer signals. Example: Payment Validation Rate is a Golden Signals Errors dimension signal."
        prior_art: ["Google SRE Golden Signals", "F-35 altitude-specific health dimension frameworks"]
        populates: []
        schema_ahead: true
        evidence:
          section_pattern: "(Golden Signal|dimension|latency|errors|traffic|saturation)"
          content_patterns:
            - pattern: "(Latency|Errors|Traffic|Saturation|Golden Signal)"
              description: "Golden Signal dimension assigned"

      - *q20
      - *q21
      - *q16b
      - *q22
      - *q22a
      - *q24a
      - *q25
      - *q26
      - *q24
      - *q23
      - *q16c

  # =================================================================
  # Part 4 — Platform Infrastructure Signals
  # =================================================================
  # Positions populated: 3-4 at System layer, grounded to position 5
  # Actor: Platform
  # Health dimension framework: USE (Utilization, Saturation, Errors)
  #                             — per F-35
  # observability_layer: System (structural — not asked)
  #
  # Same shape as Part 3, different actor and altitude.
  # No causal relationship field — System signals help explain Process
  # signals, but the causal link is typically generic.
  # =================================================================

  - part: platform_infrastructure
    description: "System-layer signals for infrastructure health"
    observability_layer: "System"
    repeat_per: signal
    questions:

      - *q16a
      - *q19
      - *q16

      - id: use_dimension
        bare: "Which USE dimension?"
        enhanced: "Utilization, Saturation, or Errors. The altitude-specific health vocabulary for System-layer signals. Example: Checkout Service Availability is a USE Errors dimension signal."
        prior_art: ["Brendan Gregg USE Method", "F-35 altitude-specific health dimension frameworks"]
        populates: []
        schema_ahead: true
        evidence:
          section_pattern: "(USE|dimension|utilization|saturation|errors)"
          content_patterns:
            - pattern: "(Utilization|Saturation|Errors|USE)"
              description: "USE dimension assigned"

      - *q20
      - *q21
      - *q16b
      - *q22
      - *q22a
      - *q24a
      - *q25
      - *q26
      - *q24
      - *q23
      - *q16c

  # =================================================================
  # Part 5 — Operational Context
  # =================================================================
  # Positions populated: 7 (BusinessRole), 8 (BusinessActor), 9 (Runbook)
  # Currently flat and service-level. The viewpoint practice identified
  # structured ownership expansion (ITIL RACI, ISA-18.2 runbooks) as
  # a future additive change (crosswalk Cluster 4).
  # =================================================================

  - part: operational
    description: "Ownership, escalation, alert routing"
    questions:

      - id: q30
        bare: "What's the dependency flow?"
        enhanced: "Full diagram — callers, callees, protocols, ports, async dependencies"
        prior_art: ["SLODLC Discover dependency map", "arc42 §3 technical context", "arc42 §6 runtime view", "ITIL CMDB CI relationships"]
        populates: ["operational.dependencyFlow"]
        schema_ahead: false
        evidence:
          section_pattern: "(dependenc|operational)"
          content_patterns:
            - pattern: "(→|->|gRPC|HTTP|Kafka)"
              description: "dependency flow diagrammed"

      - id: q31
        bare: "What's the escalation policy?"
        enhanced: "Who gets called in what order? Time-based escalation ladder."
        prior_art: ["ITIL incident management"]
        populates: ["operational.escalationPolicy"]
        schema_ahead: false
        evidence:
          section_pattern: "(escalat|operational)"
          content_patterns:
            - pattern: "(P1|escalat|on.call|15min|30min)"
              description: "escalation policy stated"

      - id: q32
        bare: "Where do alerts go?"
        enhanced: "Channel/queue/team for alerts"
        prior_art: ["SLODLC Discover §4.4 alerting channels", "ITIL incident management notification"]
        populates: ["operational.alertNotificationTargets"]
        schema_ahead: false
        evidence:
          section_pattern: "(alert|operational)"
          content_patterns:
            - pattern: "(#.*-alerts|alert.*channel|notification)"
              description: "alert routing stated"

  # =================================================================
  # Gaps
  # =================================================================

  - part: gaps
    description: "Unanswered questions, uncovered failure modes, gaps"
    questions:

      - id: q33
        bare: "What's missing?"
        enhanced: "Unanswered questions, uncovered failure modes, unidentified stakeholders, failure modes without detection signals"
        prior_art: ["SLODLC gap identification", "RTM completeness analysis", "IEC 60812 FMEA detection gap analysis"]
        populates: []
        schema_ahead: false
        evidence:
          section_pattern: "(## Gap)"
          content_patterns:
            - pattern: "^-\\s+.+"
              description: "gap items listed"
